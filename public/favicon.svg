<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 브랜드 강조색 둥근 사각형 배경 -->
  <rect width="32" height="32" rx="7" fill="#5b61e6"/>
  <!-- 좌상단 활성 칸(채움) — 에디터의 '쓴 칸' 강조와 같은 느낌 -->
  <path d="M7 9.5A2.5 2.5 0 0 1 9.5 7H16v9H7z" fill="#fff"/>
  <!-- 원고지 격자: 외곽 칸 + 2x2 분할선 -->
  <g fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round">
    <rect x="7" y="7" width="18" height="18" rx="2.5"/>
    <path d="M16 7v18M7 16h18"/>
  </g>
</svg>
