<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>palim</title>
    <!-- 원고지 본문용 명조(serif) — Noto Serif KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- 첫 페인트 전에 테마 클래스를 적용해 깜빡임(FOUC) 방지.
         키/값은 VueUse useColorMode 기본값과 일치 -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("vueuse-color-scheme") || "auto";
          var dark =
            pref === "dark" ||
            (pref === "auto" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          root.classList.toggle("dark", dark);
          root.classList.toggle("light", !dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
